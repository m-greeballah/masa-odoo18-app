# ============================================================
#  Masa Technology — GitHub Actions CI/CD Pipeline
#  Repo: masa-odoo18-app (application repo)
#
#  Flow:
#  1. PR opened    → lint + test only
#  2. Merge to main → build + scan + push + promote to DEV
#  3. Tag v*.*.*   → promote to STAGING + PRODUCTION gate
# ============================================================

name: CI/CD — Odoo 18 Build & Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"           # triggers staging/prod promotion

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/odoo18
  GITOPS_REPO: masa-technology/masa-odoo18-chart

jobs:

  # ── Job 1: Lint & Validate ──────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install flake8 pylint

      - name: Lint custom addons
        run: |
          # Lint all Python files in custom addons
          flake8 custom-addons/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --statistics
          echo "✅ Lint passed"

      - name: Validate Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ── Job 2: Build & Push Docker Image ───────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'   # only on push to main or tag
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx for efficient layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate image tags:
      # - on push to main : masatech/odoo18:abc1234  + masatech/odoo18:main
      # - on tag v1.2.3   : masatech/odoo18:v1.2.3  + masatech/odoo18:latest
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Export short SHA tag
        id: sha-tag
        run: echo "sha-tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Build and push with layer caching
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA Tag | \`${{ steps.sha-tag.outputs.sha-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Image | \`${{ env.DOCKER_IMAGE }}:${{ steps.sha-tag.outputs.sha-tag }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Security Scan ────────────────────────────────────
  scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Trivy scans for OS + library vulnerabilities
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ steps.sha.outputs.short }}
          format: table
          exit-code: "1"              # FAIL the pipeline on CRITICAL
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ── Job 4: Promote to DEV ───────────────────────────────────
  promote-dev:
    name: 🚀 Promote → DEV
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: github.ref == 'refs/heads/main'   # only on main branch push

    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Checkout the GitOps config repo
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}   # PAT with repo write access
          path: gitops

      # Update image tag in values-dev.yaml
      - name: Update DEV image tag
        run: |
          cd gitops

          # Install yq for YAML editing
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          # Update the image tag
          yq e '.image.tag = "${{ steps.sha.outputs.short }}"' \
            -i values-dev.yaml

          echo "Updated values-dev.yaml:"
          grep "tag:" values-dev.yaml

      # Commit and push → ArgoCD auto-syncs DEV
      - name: Commit and push to GitOps repo
        run: |
          cd gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add values-dev.yaml
          git commit -m "chore(dev): promote image ${{ steps.sha.outputs.short }}

          Source: ${{ github.repository }}@${{ github.sha }}
          Workflow: ${{ github.run_id }}"

          git push

      - name: Summary
        run: |
          echo "## 🚀 DEV Promotion" >> $GITHUB_STEP_SUMMARY
          echo "Image \`${{ env.DOCKER_IMAGE }}:${{ steps.sha.outputs.short }}\` promoted to DEV" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will auto-sync masa-dev namespace shortly." >> $GITHUB_STEP_SUMMARY

  # ── Job 5: Promote to STAGING (on Git tag only) ─────────────
  promote-staging:
    name: 📦 Promote → STAGING
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: startsWith(github.ref, 'refs/tags/v')   # only on version tags

    steps:
      - name: Get version tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update STAGING image tag
        run: |
          cd gitops
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq e '.image.tag = "${{ steps.tag.outputs.version }}"' \
            -i values-staging.yaml

      - name: Commit and push to GitOps repo
        run: |
          cd gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add values-staging.yaml
          git commit -m "chore(staging): promote image ${{ steps.tag.outputs.version }}

          Source: ${{ github.repository }}@${{ github.sha }}
          Tag: ${{ steps.tag.outputs.version }}"

          git push

      - name: Summary
        run: |
          echo "## 📦 STAGING Promotion" >> $GITHUB_STEP_SUMMARY
          echo "Image \`${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}\` promoted to STAGING" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Manual ArgoCD sync required for masa-staging." >> $GITHUB_STEP_SUMMARY

  # ── Job 6: Production Gate (manual approval required) ───────
  promote-production:
    name: 🔒 Promote → PRODUCTION
    runs-on: ubuntu-latest
    needs: promote-staging
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production          # ← GitHub Environment with required reviewers
      url: https://odoo.masa.tech

    steps:
      - name: Get version tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update PRODUCTION image tag
        run: |
          cd gitops
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq e '.image.tag = "${{ steps.tag.outputs.version }}"' \
            -i values-production.yaml

      - name: Commit and push to GitOps repo
        run: |
          cd gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add values-production.yaml
          git commit -m "chore(production): promote image ${{ steps.tag.outputs.version }}

          Source: ${{ github.repository }}@${{ github.sha }}
          Tag: ${{ steps.tag.outputs.version }}
          Approved by: ${{ github.actor }}"

          git push

      - name: Summary
        run: |
          echo "## 🔒 PRODUCTION Promotion" >> $GITHUB_STEP_SUMMARY
          echo "Image \`${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.version }}\` promoted to PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Manual ArgoCD sync still required for masa-production namespace." >> $GITHUB_STEP_SUMMARY
